name: Architecture Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  architecture-validation:
    name: Architecture Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Run canonical architecture validation
        run: bash tools/ci/run-architecture-validation.sh
      - name: Build workspace
        run: npm run build
