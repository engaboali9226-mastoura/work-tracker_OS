apiVersion: worktracker.io/v1

kind: Component

metadata:

  name: tasks

  displayName: Tasks

  version: 1.0.0

  description: "Manage the complete lifecycle of work tasks."

spec:

  owner: business

  category: business

  lifecycle:

    startup: automatic

    restartPolicy: always

    shutdownTimeout: 30s

  dependencies: []

  ports:

    inputs:
      - CreateTask
      - StartTask
      - PauseTask
      - ResumeTask
      - CompleteTask
      - CancelTask
      - AddTaskNote
      - GetTask
      - GetActiveTasks

    outputs:
      - TaskCreated
      - TaskStarted
      - TaskPaused
      - TaskResumed
      - TaskCompleted
      - TaskCancelled
      - TaskNoteAdded
      - ActiveTasks

  services: []

  configuration: {}

  capabilities: []

runtime:

  health:

    enabled: true

  metrics:

    enabled: true

  logging:

    enabled: true

  tracing:

    enabled: true

status:

  phase: Draft

