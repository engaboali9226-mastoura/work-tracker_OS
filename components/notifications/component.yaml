apiVersion: worktracker.io/v1

kind: Component

metadata:

  name: notifications

  displayName: Notifications

  version: 1.0.0

  description: "Manage the creation, scheduling and delivery of notifications."

spec:

  owner: business

  category: business

  lifecycle:

    startup: automatic

    restartPolicy: always

    shutdownTimeout: 30s

  dependencies: []

  ports:

    inputs:
      - CreateNotification
      - ScheduleNotification
      - SendNotification
      - CancelNotification
      - RetryNotification

    outputs:
      - NotificationCreated
      - NotificationScheduled
      - NotificationSent
      - NotificationCancelled
      - NotificationFailed

  services: []

  configuration: {}

  capabilities: []

runtime:

  health:

    enabled: true

  metrics:

    enabled: true

  logging:

    enabled: true

  tracing:

    enabled: true

status:

  phase: Draft

