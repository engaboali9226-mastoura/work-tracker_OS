apiVersion: worktracker.io/v1

kind: Component

metadata:

  name: kernel

  displayName: Kernel

  version: 1.0.0

  description: "Provide the common runtime model for every component."

spec:

  owner: business

  category: business

  lifecycle:

    startup: automatic

    restartPolicy: always

    shutdownTimeout: 30s

  dependencies: []

  ports:

    inputs:
      - Component Registration
      - Component Configuration

    outputs:
      - Registration Result
      - Health Result

  services: []

  configuration: {}

  capabilities: []

runtime:

  health:

    enabled: true

  metrics:

    enabled: true

  logging:

    enabled: true

  tracing:

    enabled: true

status:

  phase: Draft

