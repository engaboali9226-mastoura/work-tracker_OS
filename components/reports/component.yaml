apiVersion: worktracker.io/v1

kind: Component

metadata:

  name: reports

  displayName: Reports

  version: 1.0.0

  description: "Generate operational and management reports from business data."

spec:

  owner: business

  category: business

  lifecycle:

    startup: automatic

    restartPolicy: always

    shutdownTimeout: 30s

  dependencies: []

  ports:

    inputs:
      - GenerateDailyReport
      - GenerateWeeklyReport
      - GenerateMonthlyReport
      - GenerateQuarterlyReport
      - GenerateYearlyReport
      - ExportReport

    outputs:
      - ReportGenerated
      - ReportExported

  services: []

  configuration: {}

  capabilities: []

runtime:

  health:

    enabled: true

  metrics:

    enabled: true

  logging:

    enabled: true

  tracing:

    enabled: true

status:

  phase: Draft

