apiVersion: worktracker.io/v1

kind: Component

metadata:

  name: analytics

  displayName: Analytics

  version: 1.0.0

  description: "Analyze operational data and generate insights, trends, predictions and recommendations."

spec:

  owner: business

  category: business

  lifecycle:

    startup: automatic

    restartPolicy: always

    shutdownTimeout: 30s

  dependencies: []

  ports:

    inputs:
      - AnalyzeTasks
      - AnalyzeWorkdays
      - AnalyzeAttendance
      - AnalyzeReports
      - GenerateInsights

    outputs:
      - ProductivityMetrics
      - PerformanceInsights
      - RiskPrediction
      - RecommendationGenerated

  services: []

  configuration: {}

  capabilities: []

runtime:

  health:

    enabled: true

  metrics:

    enabled: true

  logging:

    enabled: true

  tracing:

    enabled: true

status:

  phase: Draft

