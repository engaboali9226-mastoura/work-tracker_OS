apiVersion: worktracker.io/v1

kind: Component

metadata:

  name: scheduler

  displayName: Scheduler

  version: 1.0.0

  description: "Manage all scheduled operations and time-based automation across Work Tracker OS."

spec:

  owner: business

  category: business

  lifecycle:

    startup: automatic

    restartPolicy: always

    shutdownTimeout: 30s

  dependencies: []

  ports:

    inputs:
      - RegisterSchedule
      - CancelSchedule
      - PauseSchedule
      - ResumeSchedule
      - ExecuteSchedule

    outputs:
      - ScheduleRegistered
      - ScheduleExecuted
      - ScheduleCancelled
      - SchedulePaused
      - ScheduleResumed
      - ScheduleFailed

  services: []

  configuration: {}

  capabilities: []

runtime:

  health:

    enabled: true

  metrics:

    enabled: true

  logging:

    enabled: true

  tracing:

    enabled: true

status:

  phase: Draft

