apiVersion: worktracker.io/v1

kind: Component

metadata:

  name: attendance

  displayName: Attendance

  version: 1.0.0

  description: "Manage attendance and departure records."

spec:

  owner: business

  category: business

  lifecycle:

    startup: automatic

    restartPolicy: always

    shutdownTimeout: 30s

  dependencies: []

  ports:

    inputs:
      - CheckIn
      - CheckOut
      - GetAttendance

    outputs:
      - CheckedIn
      - CheckedOut
      - AttendanceStatus

  services: []

  configuration: {}

  capabilities: []

runtime:

  health:

    enabled: true

  metrics:

    enabled: true

  logging:

    enabled: true

  tracing:

    enabled: true

status:

  phase: Draft

