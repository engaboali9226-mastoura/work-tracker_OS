apiVersion: worktracker.io/v1

kind: Component

metadata:

  name: dashboard

  displayName: Dashboard

  version: 1.0.0

  description: "Provide the main user dashboard by aggregating data from business components."

spec:

  owner: business

  category: business

  lifecycle:

    startup: automatic

    restartPolicy: always

    shutdownTimeout: 30s

  dependencies: []

  ports:

    inputs:
      - GetDashboard
      - RefreshDashboard

    outputs:
      - DashboardView
      - DashboardUpdated

  services: []

  configuration: {}

  capabilities: []

runtime:

  health:

    enabled: true

  metrics:

    enabled: true

  logging:

    enabled: true

  tracing:

    enabled: true

status:

  phase: Draft

