apiVersion: worktracker.io/v1

kind: Component

metadata:

  name: workday

  displayName: Workday

  version: 1.0.0

  description: "Manage the lifecycle of the working day."

spec:

  owner: business

  category: business

  lifecycle:

    startup: automatic

    restartPolicy: always

    shutdownTimeout: 30s

  dependencies: []

  ports:

    inputs:
      - StartWorkday
      - EndWorkday
      - GetCurrentWorkday

    outputs:
      - WorkdayStarted
      - WorkdayEnded
      - CurrentWorkday

  services: []

  configuration: {}

  capabilities: []

runtime:

  health:

    enabled: true

  metrics:

    enabled: true

  logging:

    enabled: true

  tracing:

    enabled: true

status:

  phase: Draft

